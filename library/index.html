<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — Stuff So Sweet</title>
  <link rel="icon" type="image/x-icon" href="https://stuffsosweet.com/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
  <meta name="robots" content="noindex,nofollow">
  <style>
    .lib-head { max-width: 720px; margin: 0 auto; padding: 32px 22px 16px; }
    .lib-head h1 { font-family: Georgia, serif; font-size: clamp(28px, 5vw, 36px); color: var(--gold); margin: 0 0 6px; letter-spacing: -0.01em; }
    .lib-head .sub { font-family: Arial, sans-serif; font-size: 13px; color: var(--faint); margin: 0; }

    .book-grid { max-width: 720px; margin: 0 auto; padding: 16px 22px 80px; display: flex; flex-direction: column; gap: 18px; }
    .book-card { display: flex; gap: 18px; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px; color: inherit; text-decoration: none; transition: background 0.15s, transform 0.1s, border-color 0.15s; }
    .book-card:hover { background: var(--card-hi); border-color: rgba(240,212,140,0.3); transform: translateY(-1px); text-decoration: none; }

    .book-cover { width: 110px; flex-shrink: 0; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; background: rgba(0,0,0,0.4); box-shadow: 0 8px 18px rgba(0,0,0,0.4); }

    .book-info { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .book-title { font-family: Georgia, serif; font-size: 20px; color: var(--gold); margin: 0; line-height: 1.2; letter-spacing: -0.01em; }
    .book-author { font-family: Arial, sans-serif; font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; }
    .book-tagline { font-family: Georgia, serif; font-size: 14px; line-height: 1.45; opacity: 0.82; margin: 6px 0 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .book-meta { display: flex; flex-wrap: wrap; gap: 10px; font-family: Arial, sans-serif; font-size: 12px; color: var(--faint); margin-top: auto; padding-top: 10px; }
    .book-meta .heat { color: var(--cta); font-weight: bold; letter-spacing: 0.04em; }

    @media (max-width: 480px) {
      .book-cover { width: 92px; }
      .book-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>

  <main>
    <div class="lib-head">
      <h1>Library</h1>
      <p class="sub" id="lib-sub">Loading…</p>
    </div>

    <div class="book-grid" id="grid"></div>
  </main>

  <script type="module">
    import { requireAuth, renderTopbar, logEvent } from "/assets/lib.js";
    await requireAuth();
    renderTopbar();

    // Library catalog — add new books here.
    const BOOKS = [
      {
        id: "where-the-wild-stays",
        title: "Where the Wild Stays",
        author: "Stuff So Sweet",
        cover: "https://trippleu.com/wp-content/uploads/2026/06/book_1_cover.webp",
        tagline: "A wildlife biologist tracks a stationary signal deeper into the Bitterroot wilderness than she should. The man at the abandoned cabin knows her name before she gives it. And then her transmitter pings inside his heartbeat.",
        chapters: 10, words: 22000, readMins: 90, heat: "Spicy",
      },
      {
        id: "foxlight",
        title: "Foxlight",
        author: "Stuff So Sweet",
        cover: "https://trippleu.com/wp-content/uploads/2026/06/book_foxlight.webp",
        tagline: "A London barrister inherits a small Welsh estate that comes with a copper-haired groundskeeper, an 1763 family compact, and a creature in the orchard at dusk with eyes the color of amber whiskey.",
        chapters: 10, words: 21000, readMins: 90, heat: "Spicy",
      },
      {
        id: "the-penthouse-floor",
        title: "The Penthouse Floor",
        author: "Stuff So Sweet",
        cover: "https://trippleu.com/wp-content/uploads/2026/06/penthouse.webp",
        tagline: "A Tribeca fashion editor meets the widower in the penthouse. He gets off the elevator on her floor to know her name before she disappears. The next morning a flat white shows up at her door.",
        chapters: 10, words: 24000, readMins: 95, heat: "Spicy",
      },
      {
        id: "across-the-driveway",
        title: "Across the Driveway",
        author: "Stuff So Sweet",
        cover: "https://trippleu.com/wp-content/uploads/2026/06/drivebay.webp",
        tagline: "A Greenwich heatwave, a fifty-eight-hour power outage, both spouses away. The architectural historian across the driveway brings his kids to her pool. Six weeks of an affair. A bittersweet end.",
        chapters: 10, words: 27000, readMins: 110, heat: "Very spicy",
      },
      {
        id: "after-hours",
        title: "After Hours",
        author: "Stuff So Sweet",
        cover: "https://trippleu.com/wp-content/uploads/2026/06/after_hours.webp",
        tagline: "A senior analyst and the senior partner at a Park Avenue investment firm. A power flicker. A drink across the street. He tells her he is experienced in things that might interest a curious mind. She has, in fact, been curious for six years.",
        chapters: 10, words: 31000, readMins: 125, heat: "Very explicit · BDSM",
      },
    ];

    const sub = document.getElementById("lib-sub");
    sub.textContent = BOOKS.length === 1 ? "1 book available" : `${BOOKS.length} books available`;

    const grid = document.getElementById("grid");
    grid.innerHTML = BOOKS.map(b => `
      <a class="book-card" href="/library/book/${b.id}/">
        <img class="book-cover" src="${b.cover}" alt="" loading="lazy">
        <div class="book-info">
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
          <p class="book-tagline">${b.tagline}</p>
          <div class="book-meta">
            <span>${b.chapters} chapters</span>
            <span>· ~${(b.words/1000).toFixed(0)}k words</span>
            <span>· ~${b.readMins} min read</span>
            <span>· <span class="heat">${b.heat}</span></span>
          </div>
        </div>
      </a>
    `).join("");

    logEvent("library_opened", {});
  </script>
</body>
</html>
