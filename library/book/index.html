<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library — Stuff So Sweet</title>
  <link rel="icon" type="image/x-icon" href="https://stuffsosweet.com/favicon.ico">
  <meta name="robots" content="noindex,nofollow">
  <script>
    // Backwards-compat redirect: /library/book/?id=<slug> -> /library/book/<slug>/
    const id = new URLSearchParams(location.search).get("id");
    if (id) {
      location.replace("/library/book/" + encodeURIComponent(id) + "/");
    } else {
      location.replace("/library/");
    }
  </script>
</head>
<body></body>
</html>
