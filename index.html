<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign in — Stuff So Sweet</title>
  <meta name="description" content="Sign in to read all your personalized stories at Stuff So Sweet.">

  <link rel="icon" type="image/x-icon" href="https://stuffsosweet.com/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="https://stuffsosweet.com/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://stuffsosweet.com/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://stuffsosweet.com/apple-touch-icon.png">
  <link rel="manifest" href="https://stuffsosweet.com/site.webmanifest">

  <meta name="theme-color" content="#4b0018">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stuff So Sweet">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Stuff So Sweet">
  <meta property="og:title" content="Sign in — Stuff So Sweet">
  <meta property="og:description" content="Sign in to read all your personalized stories at Stuff So Sweet.">
  <meta property="og:url" content="https://app.stuffsosweet.com/">
  <meta property="og:image" content="https://stuffsosweet.com/media/og-card.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main class="center">
    <div class="card">
      <div class="brand-large">Stuff So Sweet</div>
      <h1>Sign in to <span class="gold">your stories</span>.</h1>
      <p class="lede">We'll send a sign-in link to your email — the same one you used at signup.</p>

      <form id="signInForm">
        <input type="email" id="email" class="input" placeholder="you@example.com" autocomplete="email" required>
        <button type="submit" id="submitBtn" class="btn mt-16">Send me a sign-in link</button>
      </form>

      <div id="msg" class="msg" style="display:none"></div>

      <div class="fine">
        By signing in you agree to our <a href="https://stuffsosweet.com/terms-of-services.html">Terms</a> and <a href="https://stuffsosweet.com/privacy-policy.html">Privacy Policy</a>.
        <br><br>
        Don't have stories yet? <a href="https://stuffsosweet.com/">Start one →</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { redirectIfAuthenticated, requestMagicLink } from "/assets/lib.js";

    // If a session already exists, skip the sign-in form and go to stories.
    await redirectIfAuthenticated("/stories.html");

    const form = document.getElementById("signInForm");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    function showMsg(text, kind = "info") {
      msg.className = "msg " + kind;
      msg.textContent = text;
      msg.style.display = "block";
    }

    // Pre-fill email from ?email= query (used by the marketing-site "Read your stories" CTA)
    const params = new URLSearchParams(location.search);
    if (params.get("email")) emailInput.value = params.get("email");

    let cooldownUntil = 0;
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (Date.now() < cooldownUntil) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";
      msg.style.display = "none";

      const { ok, error } = await requestMagicLink(emailInput.value);

      if (ok) {
        showMsg(
          "Check your inbox — we sent a sign-in link to " + emailInput.value.trim() +
          ". The link works for 24 hours.",
          "success"
        );
        submitBtn.textContent = "Sign-in link sent ✓";
        // 30-second cooldown to discourage spam re-clicks
        cooldownUntil = Date.now() + 30000;
        setTimeout(() => {
          submitBtn.disabled = false;
          submitBtn.textContent = "Send another link";
        }, 30000);
      } else {
        showMsg(error || "Something went wrong. Try again in a moment.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Send me a sign-in link";
      }
    });
  </script>
</body>
</html>
